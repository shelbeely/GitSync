name: GitSync
description: "GitHub Command Center — a GitHub-focused mobile client for managing and syncing your repositories"
publish_to: "none"
version: 1.8.54+1854

environment:
  sdk: 3.9.0
  flutter: 3.35.2

dependencies:
  flutter:
    sdk: flutter

  animated_reorderable_list: 1.3.0
  font_awesome_flutter: ^11.0.0
  timeago: ^3.7.0
  markdown_widget: ^2.3.2
  html: ^0.15.6
  yaml: ^3.1.0

  flutter_secure_storage: 10.0.0
  oauth2_client: 4.2.5

  # flutter_secure_storage: ^9.2.4
  # oauth2_client: ^3.3.0

  file_picker: ^10.3.10
  extended_text: ^15.0.2
  url_launcher: ^6.3.2
  rust_lib_GitSync:
    path: rust_builder
  flutter_rust_bridge: 2.12.0
  http: 1.6.0
  flutter_background_service:
    git:
      url: https://github.com/ViscousPot/flutter_background_service_with_intents
      path: packages/flutter_background_service
      ref: fe783b40c0cba7331dda5a2e4987e1c739d0dbf9
  flutter_local_notifications: ^18.0.1
  fluttertoast: ^8.2.12
  permission_handler: ^11.4.0
  sprintf: ^7.0.0
  intl: any
  path_provider: ^2.1.5
  mixin_logger: ^0.1.3
  package_info_plus: ^8.3.0
  device_info_plus: ^11.3.3
  anchor_scroll_controller: ^0.4.4
  path: ^1.9.1
  open_file: ^3.5.11
  flutter_localizations:
    sdk: flutter
  ios_document_picker:
    git:
      url: https://github.com/ViscousPot/ios_document_picker
      ref: cc19fd549f23dd1f2ce3f4dd287cc653e84fd6b6
  workmanager:
    git:
      url: https://github.com/fluttercommunity/flutter_workmanager.git
      path: workmanager
      ref: main
  connectivity_plus: ^6.1.4
  encrypt: ^5.0.1
  cryptography: ^2.9.0
  convert: ^3.1.1
  flutter_localized_locales: ^2.0.5
  flutter_email_sender: ^7.0.0
  archive: ^4.0.9
  showcaseview: ^4.0.1
  file_manager: ^1.0.2
  shared_preferences: ^2.5.5
  re_editor: ^0.8.0
  mmap2: ^0.1.0
  mmap2_flutter: ^0.2.1
  re_highlight: ^0.0.3
  async: any
  collection: any
  quick_actions: ^1.1.0
  home_widget: 0.9.1
  flutter_riverpod: ^2.6.1
  dynamic_color: ^1.7.0
  web_socket_channel: ^3.0.2

dependency_overrides:
  flutter_background_service_platform_interface:
    git:
      url: https://github.com/ViscousPot/flutter_background_service_with_intents
      path: packages/flutter_background_service_platform_interface
  flutter_background_service_android:
    git:
      url: https://github.com/ViscousPot/flutter_background_service_with_intents
      path: packages/flutter_background_service_android
  flutter_background_service_ios:
    git:
      url: https://github.com/ViscousPot/flutter_background_service_with_intents
      path: packages/flutter_background_service_ios

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
  fonts:
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono/RobotoMono-Regular.ttf
        - asset: fonts/RobotoMono/RobotoMono-Bold.ttf
          weight: 700
        - asset: fonts/RobotoMono/RobotoMono-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: fonts/RobotoMono/RobotoMono-Italic.ttf
          style: italic
