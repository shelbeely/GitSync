appId: com.shelbeely.gitcommand
---
- runFlow:
    when:
      platform: Android
    commands:
      - launchApp:
          appId: com.shelbeely.gitcommand
- assertVisible: "GitSync"
- tapOn: "repository settings"
- assertVisible: "SETTINGS"
- takeScreenshot: generate_screenshots/raw/screenshot_settings
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: "back"
