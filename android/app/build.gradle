plugins {
    id "com.android.application"
    id "kotlin-android"
    id "org.jetbrains.kotlin.plugin.compose" version "2.1.0"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.shelbeely.gitcommand"
    // Pinned to API 36 (Android 16 / BAKLAVA) so we can reference
    // `Notification.ProgressStyle`, `JobScheduler#getPendingJobReasons`,
    // `ApplicationStartInfo#getStartComponent`, and the new
    // `OnBackInvokedDispatcher` priorities/callbacks at compile time.
    compileSdk = 36
    ndkVersion = "29.0.13113456"

    // keystorePropertiesFile and keystoreProperties are defined at the top of
    // this file (loaded from android/keystore.properties when present).
    if (keystorePropertiesFile.exists()) {
        def requiredKeys = ['keyAlias', 'keyPassword', 'storeFile', 'storePassword']
        def missingKeys = requiredKeys.findAll { !keystoreProperties.containsKey(it) }
        if (!missingKeys.isEmpty()) {
            throw new GradleException(
                "keystore.properties is missing required keys: ${missingKeys.join(', ')}"
            )
        }
        signingConfigs {
            release {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.shelbeely.gitcommand"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true
    }
    
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    buildFeatures {
        compose true
        buildConfig true
    }
    
    buildTypes {
        debug {
            applicationIdSuffix ".dev"
        }
        release {
            shrinkResources true
            minifyEnabled true
            if (keystorePropertiesFile.exists()) {
                signingConfig = signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies { 
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:1.2.2'
    implementation 'androidx.glance:glance-appwidget:1.1.1'
}

flutter {
    source = "../.."
}
