name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Free Disk Space
              uses: jlumbroso/free-disk-space@v1.3.1
              with:
                  android: false
                  dotnet: true
                  haskell: true
                  large-packages: true

            - name: Checkout code
              uses: actions/checkout@v4

            - name: Cache Cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Set up Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Add Android Rust targets
              run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

            - name: Set up Flutter SDK
              uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  flutter-version-file: .fvmrc
                  cache: true

            - name: Set Up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"
                  cache: "gradle"

            - name: Cache pub dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pub-cache
                  key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock', '**/pubspec.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pub-

            - name: Install flutter_rust_bridge_codegen
              uses: baptiste0928/cargo-install@v3
              with:
                  crate: flutter_rust_bridge_codegen
                  version: "2.12.0"

            - name: Install cargo-expand
              uses: baptiste0928/cargo-install@v3
              with:
                  crate: cargo-expand

            - name: Create placeholder secrets.dart
              run: |
                  mkdir -p ./lib/constant
                  if [ ! -f ./lib/constant/secrets.dart ]; then
                    cat <<'EOF' > ./lib/constant/secrets.dart
                  // Placeholder secrets – replace with real values via the `copilot` environment secret SECRETS
                  const String githubClientId = '';
                  const String githubClientSecret = '';
                  const String gitlabClientId = '';
                  const String gitlabClientSecret = '';
                  const String giteaClientId = '';
                  const String giteaClientSecret = '';
                  EOF
                  fi

            - name: Get Flutter packages
              run: flutter pub get

            - name: Generate Rust bridge bindings
              run: flutter_rust_bridge_codegen generate
