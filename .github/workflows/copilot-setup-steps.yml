name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            actions: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Flutter SDK
              uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  flutter-version-file: .fvmrc
                  cache: true

            - name: Set Up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"
                  cache: "gradle"

            - name: Cache pub dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pub-cache
                  key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock', '**/pubspec.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pub-

            - name: Create placeholder secrets.dart
              run: |
                  mkdir -p ./lib/constant
                  if [ ! -f ./lib/constant/secrets.dart ]; then
                    cat <<'EOF' > ./lib/constant/secrets.dart
                  // Placeholder secrets – replace with real values via the `copilot` environment secret SECRETS
                  const String githubClientId = '';
                  const String githubClientSecret = '';
                  const String gitlabClientId = '';
                  const String gitlabClientSecret = '';
                  const String giteaClientId = '';
                  const String giteaClientSecret = '';
                  EOF
                  fi

            - name: Get Flutter packages
              run: flutter pub get

            - name: Run unit tests
              run: flutter test test/
