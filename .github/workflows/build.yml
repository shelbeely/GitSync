name: Build (Android APK)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: false
          dotnet: true
          haskell: true
          large-packages: true

      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Step 1 – Rust toolchain + Android cross-compile targets
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      # Step 3 – OAuth secrets (secrets.dart is gitignored; inject from repo secret)
      - name: Create secrets.dart
        run: |
          echo "Creating secrets.dart from repo secret"
          cat <<'EOF' > ./lib/constant/secrets.dart
          ${{ secrets.SECRETS }}
          EOF

      # Step 1 – Flutter SDK (version pinned in .fvmrc; single source of truth)
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc
          cache: true

      # Android build toolchain
      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # Cache the Dart pub cache so packages aren't re-downloaded every run.
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock', '**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Step 4 – flutter_rust_bridge_codegen (version pinned per README).
      # baptiste0928/cargo-install caches the compiled binary across runs.
      - name: Install flutter_rust_bridge_codegen
        uses: baptiste0928/cargo-install@v3
        with:
          crate: flutter_rust_bridge_codegen
          version: "2.12.0"

      - name: Install cargo-expand (required by flutter_rust_bridge_codegen)
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-expand

      # Step 2 – install Dart/Flutter packages
      - name: Get Flutter packages
        run: flutter pub get

      # Step 4 – generate Rust ↔ Dart bridge
      - name: Generate Rust bridge bindings
        run: flutter_rust_bridge_codegen generate

      # Android NDK (required for Rust cross-compilation)
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29-beta4

      - uses: SimonMarquis/android-accept-licenses@v1

      # Step 5 – build
      - name: Build Release APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*-release.apk
